name: Deploy Extension Binaries
on:
  workflow_run:
    workflows: ["Main Extension Distribution Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download artifacts from build workflow
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          run-id: ${{ github.event.workflow_run.id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Create directory structure for DuckDB
        run: |
          mkdir -p site/v1.5.2
          for dir in artifacts/talib-*; do
            [ -d "$dir" ] || continue
            arch=$(echo "$dir" | sed 's/.*extension-//')
            mkdir -p "site/v1.5.2/$arch"
            for f in "$dir"/*.duckdb_extension; do
              [ -f "$f" ] || continue
              cp "$f" "site/v1.5.2/$arch/"
            done
          done
          echo "Directory structure:"
          find site -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
